# Integration 테스트용 설정
# datasource, minio는 Testcontainers가 @DynamicPropertySource로 동적 주입
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: integration-test-secret-key-at-least-256-bits-for-hs256-algorithm
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

minio:
  endpoint: overridden-by-testcontainers
  access-key: minioadmin
  secret-key: minioadmin
  bucket: test-bucket

app:
  owner:
    username: owner
    password: owner-test-password-123
    nickname: Owner
