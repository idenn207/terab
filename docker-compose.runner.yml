# GitHub Actions Self-hosted Runner
# 사용법: NAS SSH 접속 후 아래 명령 실행
#
#   cp runner.env.example runner.env   # 최초 1회
#   vi runner.env                      # ACCESS_TOKEN 값 입력 후 저장
#   docker compose -f docker-compose.runner.yml up -d
#
# ACCESS_TOKEN 발급:
#   GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)
#   → Generate new token (classic) → scope: repo 체크
#
# 컨테이너 재시작 시 ACCESS_TOKEN으로 RUNNER_TOKEN을 자동 갱신함 (수동 갱신 불필요)

services:
  github-runner:
    image: myoung34/github-runner:latest
    container_name: github-runner
    restart: unless-stopped
    env_file:
      - application-runner.properties
    environment:
      REPO_URL: https://github.com/idenn207/terab
      RUNNER_NAME: terab-nas-runner
      LABELS: self-hosted,nas
      EPHEMERAL: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_data:/home/runner
    # terab 스택 네트워크 불필요 - GitHub에 아웃바운드 연결만 사용

volumes:
  runner_data:
