# 로컬 개발용 standalone 설정
# 사용법:
#   make infra    → DB + MinIO만 (로컬 API/Web 서버와 함께 사용)
#   make dev-up   → 전체 서비스 (컨테이너 환경 검증)

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: terab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - terab-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MinIO (S3 호환 오브젝트 스토리지) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: terab-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./volumes/storage:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - terab-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot API ─────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: terab-api
    restart: on-failure
    volumes:
      - ./application-local.properties:/app/application.properties:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/terab_db
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - terab-net

  # ─── React Frontend ──────────────────────────────────────────────
  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: terab-web
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - terab-net

  # ─── Nginx (리버스 프록시) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: terab-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - terab-net

networks:
  terab-net:
    driver: bridge
