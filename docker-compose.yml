version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: terab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${DB_DATA_PATH:-./volumes/db}:/var/lib/postgresql/data
    networks:
      - terab-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MinIO (S3 호환 오브젝트 스토리지) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: terab-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ${MINIO_DATA_PATH:-./volumes/storage}:/data
    ports:
      - '9001:9001' # MinIO Web Console (관리용)
    networks:
      - terab-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot API ─────────────────────────────────────────────
  api:
    image: ghcr.io/idenn207/terab-api:latest
    container_name: terab-api
    restart: on-failure
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    networks:
      - terab-net

  # ─── React Frontend ──────────────────────────────────────────────
  web:
    image: ghcr.io/idenn207/terab-web:latest
    container_name: terab-web
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    networks:
      - terab-net

  # ─── Nginx (리버스 프록시) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: terab-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ${NGINX_CONF_PATH:-./services/nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - terab-net

  # ─── Watchtower (자동 배포) ──────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: terab-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: 43200
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_INCLUDE_STOPPED: 'false'
      WATCHTOWER_LABEL_ENABLE: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - terab-net

networks:
  terab-net:
    driver: bridge
