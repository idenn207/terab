version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    networks:
      - nas-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3 호환 오브젝트 스토리지) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nas-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./volumes/storage:/data
    ports:
      - "9001:9001"   # MinIO Web Console (관리용)
    networks:
      - nas-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot API ─────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: nas-api
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - nas-net

  # ─── React Frontend ──────────────────────────────────────────────
  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: nas-web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - nas-net

  # ─── Nginx (리버스 프록시) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - nas-net

  # ─── Watchtower (자동 배포) ──────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: nas-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: 43200
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_LABEL_ENABLE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nas-net

networks:
  nas-net:
    driver: bridge
