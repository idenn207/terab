# Docker Swarm 프로덕션 스택
# 사용법: ./scripts/check-secrets.sh && docker stack deploy -c docker-stack.yml terab --with-registry-auth
# 로컬 개발: docker-compose.local.yml 사용

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: terab_db
      POSTGRES_USER: terab_user
      POSTGRES_PASSWORD_FILE: /run/secrets/terab_db_password
    secrets:
      - terab_db_password
    volumes:
      - /volume2/docker/terab/volumes/db:/var/lib/postgresql/data
    networks:
      - terab-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U terab_user -d terab_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ─── MinIO (S3 호환 오브젝트 스토리지) ───────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/terab_minio_password
    secrets:
      - terab_minio_password
    volumes:
      - /volume1/storage:/data
    ports:
      - '9001:9001'
    networks:
      - terab-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ─── Spring Boot API ──────────────────────────────────────────
  api:
    image: ghcr.io/idenn207/terab-api:latest
    environment:
      DB_URL: jdbc:postgresql://db:5432/terab_db
      DB_USER: terab_user
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_BUCKET: terab-files
      JWT_EXPIRATION_MS: 86400000
      # DB_PASSWORD, MINIO_SECRET_KEY, JWT_SECRET 은
      # docker-entrypoint.sh가 /run/secrets/ 에서 읽어 주입
    secrets:
      - terab_db_password
      - terab_minio_password
      - terab_jwt_secret
    networks:
      - terab-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
        delay: 10s
        monitor: 120s
      rollback_config:
        order: start-first
        parallelism: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─── React Frontend ───────────────────────────────────────────
  web:
    image: ghcr.io/idenn207/terab-web:latest
    networks:
      - terab-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
        delay: 10s
        monitor: 20s
      rollback_config:
        order: start-first
      restart_policy:
        condition: on-failure

  # ─── Nginx (리버스 프록시) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - /volume2/docker/terab/services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - terab-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ─── Portainer CE (컨테이너 모니터링 UI) ─────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.portainer_agent:9001 --tlsskipverify
    ports:
      - '9443:9443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - terab-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  portainer_agent:
    image: portainer/agent:latest
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer_agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - terab-net
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

volumes:
  portainer_data:

networks:
  terab-net:
    driver: overlay

secrets:
  terab_db_password:
    external: true
  terab_minio_password:
    external: true
  terab_jwt_secret:
    external: true
