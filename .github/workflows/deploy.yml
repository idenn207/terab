name: Build & Push

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  # ─── 테스트 ──────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Backend tests
        working-directory: services/api
        run: ./gradlew check

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Frontend tests
        working-directory: services/web
        run: |
          npm ci
          npm test

  # ─── Docker 이미지 빌드 & Push ──────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: ./services/api
          - service: web
            context: ./services/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/terab-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── ghcr.io 오래된 이미지 정리 ─────────────────────────────────
  cleanup:
    name: Cleanup Old Images
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        package: [terab-api, terab-web]

    steps:
      - name: Delete old versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

  # ─── NAS 배포 (Swarm rolling update) ────────────────────────────
  deploy:
    name: Deploy to NAS
    needs: [build-and-push]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy api & web via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT }}
          script: |
            set -e
            # api rolling update: start-first + health gate + auto rollback on failure
            # ghcr.io 인증은 NAS에 수동 등록된 자격증명 사용 (docker login ghcr.io)
            docker service update \
              --image ghcr.io/idenn207/terab-api:latest \
              --with-registry-auth \
              terab_api

            # web rolling update
            docker service update \
              --image ghcr.io/idenn207/terab-web:latest \
              --with-registry-auth \
              terab_web

