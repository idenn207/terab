changelog:
  categories:
    - title: "🚀 새 기능"
      labels: [feat, enhancement]
    - title: "🐛 버그 수정"
      labels: [fix, bug]
    - title: "🔧 설정 및 환경"
      labels: [chore, infrastructure]
    - title: "📝 문서"
      labels: [docs, documentation]
    - title: "♻️ 리팩토링"
      labels: [refactor]
    - title: "🧪 테스트"
      labels: [test]
    - title: "기타"
      labels: ["*"]
